[ABOUT]
NAME = Spotify Now Playing
AUTHOR = neonoxd
VERSION = 1.0.8.3
DESCRIPTION = Display currently playing Spotify track with album art
REQUIRED_VERSION = 0
URL = https://github.com/neonoxd/ac-spotify-nowplaying-lua

[WINDOW_...]
ID = spotify_main
NAME = Spotify Now Playing
ICON = icon.png
FUNCTION_MAIN = windowMain
FUNCTION_SETTINGS = windowSettings
SIZE = 540, 200
FLAGS = SETTINGS, FADING

[WINDOW_...]
ID = spotify_album
NAME = Album Art Widget
ICON = icon_a.png
FUNCTION_MAIN = windowAlbum
FUNCTION_SETTINGS = windowAlbumSettings
SIZE = 256, 256
FLAGS = FADING, SETTINGS

[WINDOW_...]
ID = spotify_progress
NAME = Track Details Widget
ICON = icon_w.png
FUNCTION_MAIN = windowProgress
FUNCTION_SETTINGS = windowProgressSettings
SIZE = 512, 256
FLAGS = FADING, SETTINGS