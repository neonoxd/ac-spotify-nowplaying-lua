name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Set variables
        id: vars
        run: |
          VERSION=$(grep '^VERSION' manifest.ini | sed 's/VERSION\s*=\s*//' | tr -d '[:space:]')
          TAG="v${VERSION}"
          FOLDER="spotify_nowplaying"
          ZIP="${FOLDER}-${VERSION}.zip"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "zip=$ZIP" >> $GITHUB_OUTPUT


      - name: Check if version already released
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.vars.outputs.tag }}$"; then
            echo "Version ${{ steps.vars.outputs.version }} already released, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi


      - name: Copy files into release folder
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir "${{ steps.vars.outputs.folder }}"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='${{ steps.vars.outputs.folder }}' \
            ./ "${{ steps.vars.outputs.folder }}/"


      - name: Create zip
        if: steps.check.outputs.skip == 'false'
        run: |
          zip -r "${{ steps.vars.outputs.zip }}" "${{ steps.vars.outputs.folder }}"


      - name: Create release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.folder }} ${{ steps.vars.outputs.tag }}
          files: ${{ steps.vars.outputs.zip }}